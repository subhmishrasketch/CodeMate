<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3c50dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c3dd1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#grad1)"/>
  
  <!-- Code brackets with collaboration theme -->
  <g transform="translate(100, 100)">
    <!-- Left bracket -->
    <path d="M -35 -40 Q -50 -40 -50 -20 Q -50 0 -35 20 Q -20 40 -50 40" 
          stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 35 -40 Q 50 -40 50 -20 Q 50 0 35 20 Q 20 40 50 40" 
          stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Connection line (collaboration element) -->
    <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Small dots representing connection -->
    <circle cx="-15" cy="0" r="3" fill="white" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
    <circle cx="15" cy="0" r="3" fill="white" opacity="0.8"/>
  </g>
</svg>
